<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NORTH36</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:#080808;
    color:#f2f2f2;
}

/* HERO */

.hero{
    height:100vh;
    background:
    linear-gradient(
    rgba(0,0,0,.55),
    rgba(0,0,0,.75)),
    url('hero.jpg');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero-content{
    max-width:900px;
}

.logo{
    font-size:90px;
    letter-spacing:18px;
    font-weight:300;
}

.subtitle{
    margin-top:20px;
    letter-spacing:6px;
    font-size:12px;
    color:#c7c7c7;
}

.enter{
    display:inline-block;
    margin-top:40px;
    padding:14px 32px;
    border:1px solid rgba(255,255,255,.25);
    text-decoration:none;
    color:white;
    letter-spacing:3px;
    transition:.3s;
}

.enter:hover{
    background:white;
    color:black;
}

/* SECTION */

.section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:120px 25px;
}

.text-box{
    max-width:800px;
    text-align:center;
}

.heading{
    font-size:12px;
    letter-spacing:6px;
    color:#8f8f8f;
    margin-bottom:50px;
}

.statement{
    font-size:38px;
    line-height:1.6;
    font-weight:300;
}

/* LAND */

.land{
    padding:120px 40px;
}

.land-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.land-card{
    height:450px;
    position:relative;
    overflow:hidden;
}

.land-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.6s;
}

.land-card:hover img{
    transform:scale(1.05);
}

.land-title{
    position:absolute;
    bottom:30px;
    left:30px;
    font-size:28px;
    letter-spacing:5px;
}

/* FOOTER */

footer{
    padding:80px 20px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,.08);
}

footer h2{
    letter-spacing:10px;
    font-weight:300;
    margin-bottom:15px;
}

footer p{
    color:#8c8c8c;
    letter-spacing:3px;
    font-size:11px;
}

</style>
</head>

<body>

<section class="hero">

    <div class="hero-content">

        <div class="logo">NORTH36</div>

        <div class="subtitle">
            FROM SEA TO STONE
        </div>

        <a href="#manifesto" class="enter">
            ENTER
        </a>

    </div>

</section>

<section class="section" id="manifesto">

    <div class="text-box">

        <div class="heading">
            MANIFESTO
        </div>

        <div class="statement">

            Built between the Mediterranean
            and the Sahara.

            <br><br>

            Shaped by memory.

            <br><br>

            Designed for tomorrow.

        </div>

    </div>

</section>

<section class="land">

    <div class="heading" style="text-align:center;">
        THE LAND
    </div>

    <div class="land-grid">

        <div class="land-card">
            <img src="sea.jfif">
            <div class="land-title">
                SEA
            </div>
        </div>

        <div class="land-card">
            <img src="mountain.jfif">
            <div class="land-title">
                MOUNTAIN
            </div>
        </div>

        <div class="land-card">
            <img src="desert.jfif">
            <div class="land-title">
                DESERT
            </div>
        </div>

    </div>

</section>

<footer>

    <h2>NORTH36</h2>

    <p>
        EST. 2026 • TUNISIA
    </p>

</footer>

</body>
</html>
